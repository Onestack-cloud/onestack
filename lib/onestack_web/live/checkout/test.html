<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Open-Source Software Hosting Checkout</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #1e1e1e;
			color: #ffffff;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}

		.checkout-container {
			background-color: #2d2d2d;
			padding: 20px;
			border-radius: 8px;
			width: 400px;
		}

		.product-list {
			display: flex;
			justify-content: space-between;
			margin-bottom: 20px;
		}

		.product {
			background-color: #3d3d3d;
			padding: 10px;
			border-radius: 4px;
			font-size: 12px;
		}

		.slider-container {
			margin-bottom: 20px;
		}

		input[type="range"] {
			width: 100%;
		}

		.price-display {
			text-align: right;
			font-size: 18px;
			margin-bottom: 20px;
		}

		.subscribe-btn {
			background-color: #4CAF50;
			color: white;
			padding: 10px 20px;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			width: 100%;
			font-size: 16px;
		}
	</style>
</head>

<body>
	<div class="checkout-container">
		<div class="product-list">
			<div class="product">Plane</div>
			<div class="product">Cal</div>
			<div class="product">Formbricks</div>
			<div class="product">Documento</div>
			<div class="product">Castopod</div>
		</div>
		<div class="slider-container">
			<label for="team-size">How big is your team?</label>
			<input type="range" id="team-size" min="10" max="100" step="10" value="10">
			<output for="team-size">10 users</output>
		</div>
		<div class="price-display">
			Total: $10/month
		</div>
		<button class="subscribe-btn">Subscribe</button>
	</div>

	<script>
		const slider = document.getElementById('team-size');
		const output = document.querySelector('output[for="team-size"]');
		const priceDisplay = document.querySelector('.price-display');

		slider.oninput = function () {
			output.textContent = this.value + ' users';
			const price = Math.ceil(this.value / 10) * 10;
			priceDisplay.textContent = `Total: $${price}/month`;
		}
	</script>
</body>

</html>

api:
    dashboard: true
    insecure: false


entryPoints:
    web:
        address: ":80"
    websecure:
        address: ":443"
    traefik:
        address: ":8080"
    postgres:
        address: ":5432"
    mariadb:
        address: ":3306"
    valkey:
        address: ":6379"
    mongodb:
        address: ":27017"
    twenty_db:
        address: ":5420"


providers:
    docker:
        endpoint: "unix:///var/run/docker.sock"
        exposedByDefault: false

certificatesResolvers:
    letsencrypt:
        acme:
            email: george@onestack.cloud
            storage: /etc/traefik/acme.json
            httpChallenge:
                entryPoint: web

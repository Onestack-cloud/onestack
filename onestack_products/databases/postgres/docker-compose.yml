services:
    postgres_db:
        image: "postgres:16-alpine"
        container_name: postgres_db
        env_file:
            - .env
        restart: unless-stopped
        networks:
            - traefik_default
        labels:
            - "traefik.enable=true"
            - "traefik.tcp.routers.postgres.rule=HostSNI(`*`)"
            # - "traefik.tcp.routers.postgres.tls=true"
            - "traefik.tcp.routers.postgres.entrypoints=postgres"
            # - "traefik.tcp.routers.postgres.tls.certresolver=letsencrypt"
            - "traefik.tcp.services.postgres.loadbalancer.server.port=5432"
        healthcheck:
            test:
                - CMD-SHELL
                - "psql -U onestack-cal -d onestack-cal -c 'SELECT 1' || exit 1"
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 5s
        # mem_limit: "0"
        # memswap_limit: "0"
        # mem_swappiness: 60
        # mem_reservation: "0"
        # cpus: 0.0
        # cpu_shares: 1024
        volumes:
            - "/root/databases/postgres/data:/var/lib/postgresql/data"

networks:
    traefik_default:
        external: true

volumes:
    postgres-data:
        name: postgres-data
        external: false

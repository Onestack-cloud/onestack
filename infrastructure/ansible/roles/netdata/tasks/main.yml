---
# Netdata monitoring setup

- name: Check if Netdata is installed
  stat:
    path: /etc/netdata
  register: netdata_installed

- name: Install Netdata
  shell: |
    curl https://get.netdata.cloud/kickstart.sh > /tmp/netdata-kickstart.sh && \
    sh /tmp/netdata-kickstart.sh --non-interactive --stable-channel
  args:
    creates: /etc/netdata/netdata.conf
  when: not netdata_installed.stat.exists

- name: Configure Netdata
  template:
    src: netdata.conf.j2
    dest: /etc/netdata/netdata.conf
    mode: "0644"
  notify: restart netdata

- name: Create Traefik dynamic config for Netdata
  template:
    src: traefik-netdata.yml.j2
    dest: "{{ apps_dir }}/traefik_docker/dynamic/netdata.yml"
    mode: "0644"

- name: Start and enable Netdata
  service:
    name: netdata
    state: started
    enabled: yes

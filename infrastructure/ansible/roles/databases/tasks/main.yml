---
# Shared databases setup

- name: Create databases directory
  file:
    path: "{{ databases_dir }}"
    state: directory
    mode: "0755"

# PostgreSQL
- name: Create PostgreSQL directory
  file:
    path: "{{ databases_dir }}/postgres"
    state: directory
    mode: "0755"

- name: Create PostgreSQL data directory
  file:
    path: "{{ databases_dir }}/postgres/data"
    state: directory
    mode: "0755"

- name: Deploy PostgreSQL docker-compose
  template:
    src: postgres/docker-compose.yml.j2
    dest: "{{ databases_dir }}/postgres/docker-compose.yml"
    mode: "0644"

- name: Start PostgreSQL
  community.docker.docker_compose_v2:
    project_src: "{{ databases_dir }}/postgres"
    state: present
    pull: always


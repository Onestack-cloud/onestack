---
# Docker installation and configuration

- name: Remove old Docker packages
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

- name: Get Debian codename
  command: lsb_release -cs
  register: debian_codename
  changed_when: false

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ debian_codename.stdout }} stable"
    state: present
    filename: docker

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Install Python Docker SDK
  pip:
    name:
      - docker
      - docker-compose
    state: present

- name: Create Docker daemon config directory
  file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker daemon
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: restart docker

- name: Start and enable Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Create Docker network for Traefik
  docker_network:
    name: "{{ docker_network_name }}"
    state: present

- name: Login to GitLab registry
  docker_login:
    registry: registry.gitlab.com
    username: "{{ vault_gitlab_registry_user }}"
    password: "{{ vault_gitlab_registry_token }}"
  when: vault_gitlab_registry_token is defined and vault_gitlab_registry_token != "REPLACE_WITH_ACTUAL_TOKEN"

- name: Prune unused Docker resources (weekly cron)
  cron:
    name: "Docker system prune"
    weekday: "0"
    hour: "3"
    minute: "0"
    job: "docker system prune -af --volumes >> /var/log/docker-prune.log 2>&1"
